<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Intro</title>

  <!-- League Spartan Font -->
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700&display=swap" rel="stylesheet">

  <style>
  /* ========================= */
  /* LANDING PAGE STYLES */
  /* ========================= */
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff2a2a, #b30000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'League Spartan', sans-serif;
    overflow: hidden;
    cursor: none;
    text-align: center;
  }

  /* Heading */
  h1 {
    font-size: 3rem;
    line-height: 1.5;
    letter-spacing: 2px;
    color: #fff;
    position: relative;
    z-index: 10;
  }

  /* Neon edge effect for letters */
  span {
    display: inline-block;
    opacity: 0;
    transform: translateY(50px);
    color: #fff;
    text-shadow:
      0 0 2px #fff,
      0 0 6px #ff4d4d,
      0 0 12px #ff1a1a,
      0 0 20px #ff1a1a;
    animation: rise 0.7s forwards;
  }

  @keyframes rise {
    to {
      opacity: 1;
      transform: translateY(0);
      text-shadow:
        0 0 3px #fff,
        0 0 10px #ff4d4d,
        0 0 20px #ff1a1a,
        0 0 30px #ff0000;
    }
  }

  /* Firework particle */
  .firework {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    animation: explode 1s ease-out forwards;
  }

  @keyframes explode {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(1.5) translate(var(--dx), var(--dy)); opacity: 0; }
  }

  /* Mouse glow */
  .cursor {
    position: fixed;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(255,255,255,0.5), transparent);
    pointer-events: none;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 15;
  }

  /* Fade & blur overlay for transition */
  #overlay {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    backdrop-filter: blur(8px);
    z-index: 20;
    transition: opacity 1s ease;
  }
  </style>
</head>

<body>
  <div class="cursor" id="cursor"></div>
  <div id="overlay"></div>
  <h1 id="text"></h1>

  <script>
  /* Letters animation */
  const lines = ["WELCOME", "TO", "MY PORTFOLIO"];
  const container = document.getElementById("text");
  let index = 0;

  lines.forEach(line => {
    const div = document.createElement("div");
    line.split("").forEach(char => {
      const span = document.createElement("span");
      span.innerText = char;
      span.style.animationDelay = (index * 0.1) + "s"; // stagger letters
      div.appendChild(span);
      index++;
    });
    container.appendChild(div);
  });

  /* Fireworks with particle trails */
  function createFirework() {
    const count = 15 + Math.floor(Math.random() * 10);
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight * 0.5;

    for(let i=0; i<count; i++){
      const fw = document.createElement("div");
      fw.className = "firework";
      fw.style.left = x + "px";
      fw.style.top = y + "px";
      const angle = Math.random() * 2 * Math.PI;
      const distance = 50 + Math.random()*50;
      fw.style.setProperty('--dx', distance * Math.cos(angle) + 'px');
      fw.style.setProperty('--dy', distance * Math.sin(angle) + 'px');
      document.body.appendChild(fw);
      setTimeout(() => fw.remove(), 1000);
    }
  }

  const fireworkInterval = setInterval(createFirework, 400);

  /* Mouse-follow glow */
  const cursor = document.getElementById("cursor");
  document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

  /* Fade/blur overlay and redirect */
  setTimeout(() => {
    clearInterval(fireworkInterval);
    const overlay = document.getElementById("overlay");
    overlay.style.opacity = 1;
    setTimeout(() => {
      window.location.href = "index.html"; // redirect to your portfolio
    }, 1000);
  }, 3000);
  </script>
</body>
